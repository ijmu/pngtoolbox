<main class="page article-page"><p class="eyebrow">PNG 基础</p><h1>什么是透明 PNG</h1><section><h2>透明背景不是白色背景</h2><p>白底图片只是把背景画成白色，放到彩色页面上仍会看到白色方块。透明 PNG 会保存透明通道，空白区域可以露出后面的页面、海报或视频背景。</p></section><section><h2>Alpha 通道的作用</h2><p>PNG 支持 Alpha 通道，用来记录每个像素的透明程度。它可以完全不透明、完全透明，也可以半透明。</p></section><section><h2>为什么 Logo 常用透明 PNG</h2><p>Logo 经常需要放在不同背景上。透明 PNG 可以避免白色边框，让 Logo 自然叠加到网页、PPT、封面和电商图片中。</p><p><a href="./#transparent-png">打开 PNG 透明背景处理工具</a></p></section></main><script src="../translate.js"></script></body></html>
