<main class="page article-page"><p class="eyebrow">操作教程</p><h1>如何把 PNG 背景变透明</h1><section><h2>适合处理的图片</h2><p>白底、灰底、蓝底或其他接近纯色背景的 PNG 最适合。产品图、简单 Logo、图标和贴纸素材通常效果较好。</p></section><section><h2>操作步骤</h2><ol><li>打开 PNG 透明背景工具。</li><li>上传 PNG 文件。</li><li>点击预览图里的背景区域吸取颜色。</li><li>调节容差，让相近颜色一起透明。</li><li>使用边缘柔化减少硬边。</li><li>确认后下载透明 PNG。</li></ol><p><a href="./#transparent-png">开始处理 PNG 透明背景</a></p></section></main><script src="../translate.js"></script></body></html>
