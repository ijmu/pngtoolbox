<main class="page article-page"><p class="eyebrow">格式对比</p><h1>WebP 和 PNG 有什么区别</h1><section><h2>一句话区别</h2><p>WebP 更适合网页性能和小文件，PNG 更适合透明图形、截图、Logo、图标和需要广泛兼容的文件。</p></section><section><h2>文件大小</h2><p>WebP 通常能得到更小的网页图片，尤其是照片和复杂画面。PNG 文件可能更大，但文字、线条和边缘更稳定。</p></section><section><h2>透明背景</h2><p>WebP 和 PNG 都可以支持透明，但 PNG 在设计软件、办公软件、电商后台和交付场景里接受度更高。</p></section></main><script src="../translate.js"></script></body></html>
