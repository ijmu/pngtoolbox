<main class="page article-page"><p class="eyebrow">图片格式基础</p><h1>PNG 格式基础知识</h1><section><h2>PNG 是什么</h2><p>PNG 是常见图片格式，适合截图、图标、Logo、界面素材和透明图形。它兼容性好，能保留清晰边缘和透明通道。</p></section><section><h2>PNG 的优点</h2><ul><li>支持透明背景。</li><li>适合文字、线条和图形边缘。</li><li>很多软件和平台都能打开。</li><li>保存时不会像 JPG 那样反复产生明显压缩损伤。</li></ul></section><section><h2>PNG 的缺点</h2><p>PNG 文件可能比较大，尤其是复杂照片。如果只是网页展示，WebP 或 JPG 可能更省空间。</p></section></main><script src="../translate.js"></script></body></html>
